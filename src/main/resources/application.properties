# Application
spring.application.name=sftp-manager
server.port=8080

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# Logging
logging.level.com.sftpmanager=INFO
logging.level.org.springframework.security=WARN


# spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
# spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
# spring.security.oauth2.client.registration.google.scope=email,profile


# Google OAuth2 - Portal (regular users)
spring.security.oauth2.client.registration.google-portal.client-id=${GOOGLE_PORTAL_CLIENT_ID}
spring.security.oauth2.client.registration.google-portal.client-secret=${GOOGLE_PORTAL_CLIENT_SECRET}
spring.security.oauth2.client.registration.google-portal.scope=email,profile
spring.security.oauth2.client.registration.google-portal.provider=google
spring.security.oauth2.client.registration.google-portal.redirect-uri={baseUrl}/login/oauth2/code/google-portal

# Google OAuth2 - Admin
spring.security.oauth2.client.registration.google-admin.client-id=${GOOGLE_ADMIN_CLIENT_ID}
spring.security.oauth2.client.registration.google-admin.client-secret=${GOOGLE_ADMIN_CLIENT_SECRET}
spring.security.oauth2.client.registration.google-admin.scope=email,profile
spring.security.oauth2.client.registration.google-admin.provider=google
spring.security.oauth2.client.registration.google-admin.redirect-uri={baseUrl}/login/oauth2/code/google-admin

# Spring Session JDBC - share sessions across all pods via PostgreSQL
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=3600s
# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App base URL (used in email links)
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.mail.from=${GMAIL_USERNAME}
# Google reCAPTCHA v3
recaptcha.secret-key=${RECAPTCHA_SECRET_KEY:}
