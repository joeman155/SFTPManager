<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SFTP Manager — Email Verified</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background:linear-gradient(135deg,#1a1f36 0%,#2d3748 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:#fff; border-radius:16px; padding:48px 40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.3); text-align:center; }
    </style>
</head>
<body>
<div class="card">
    <div id="content">Loading...</div>
</div>
<script>
const path = window.location.pathname;
const el = document.getElementById('content');

if (path.includes('verify-success')) {
    el.innerHTML = `
        <i class="bi bi-check-circle text-success" style="font-size:3rem"></i>
        <h4 class="mt-3 fw-bold">Email verified!</h4>
        <p class="text-muted">Your email has been verified. You can now continue setting up your account.</p>
        <a href="/portal" class="btn btn-primary mt-2">Continue to SFTP Manager</a>`;
    // Auto redirect after 3 seconds
    setTimeout(() => window.location.href = '/portal', 3000);
} else if (path.includes('verify-expired')) {
    el.innerHTML = `
        <i class="bi bi-clock text-warning" style="font-size:3rem"></i>
        <h4 class="mt-3 fw-bold">Link expired</h4>
        <p class="text-muted">This verification link has expired. Please request a new one.</p>
        <a href="/portal/login" class="btn btn-primary mt-2">Back to sign in</a>`;
} else if (path.includes('verify-already')) {
    el.innerHTML = `
        <i class="bi bi-info-circle text-info" style="font-size:3rem"></i>
        <h4 class="mt-3 fw-bold">Already verified</h4>
        <p class="text-muted">This email has already been verified.</p>
        <a href="/portal" class="btn btn-primary mt-2">Go to dashboard</a>`;
} else {
    el.innerHTML = `
        <i class="bi bi-x-circle text-danger" style="font-size:3rem"></i>
        <h4 class="mt-3 fw-bold">Invalid link</h4>
        <p class="text-muted">This verification link is not valid.</p>
        <a href="/portal/login" class="btn btn-primary mt-2">Back to sign in</a>`;
}
</script>
</body>
</html>
