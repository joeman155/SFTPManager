<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SFTP Manager — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background:linear-gradient(135deg,#1a1f36 0%,#2d3748 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-card { background:#fff; border-radius:16px; padding:40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
        .brand { font-size:1.4rem; font-weight:700; color:#1a1f36; margin-bottom:4px; }
        .subtitle { color:#6b7280; font-size:.9rem; margin-bottom:28px; }
        .google-btn { display:flex; align-items:center; justify-content:center; gap:12px; background:#fff; border:1.5px solid #e5e7eb; border-radius:8px; padding:12px 24px; width:100%; font-size:.92rem; font-weight:500; color:#374151; text-decoration:none; transition:all .2s; }
        .google-btn:hover { background:#f9fafb; border-color:#d1d5db; box-shadow:0 2px 8px rgba(0,0,0,0.08); color:#374151; }
        .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:#9ca3af; font-size:.8rem; }
        .divider::before, .divider::after { content:''; flex:1; border-top:1px solid #e5e7eb; }
        .alert-msg { border-radius:8px; padding:11px 14px; font-size:.86rem; margin-bottom:14px; display:none; }
        .alert-error { background:#fef2f2; border:1px solid #fecaca; color:#dc2626; }
        .alert-success { background:#d1fae5; border:1px solid #6ee7b7; color:#065f46; }
        .footer-note { color:#9ca3af; font-size:.76rem; text-align:center; margin-top:20px; }
        .pw-toggle { position:relative; }
        .pw-toggle input { padding-right:40px; }
        .pw-toggle .eye { position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#9ca3af; border:none; background:none; padding:0; }
        .field-error { color:#dc2626; font-size:.78rem; margin-top:3px; }
    </style>
    <script src="https://www.google.com/recaptcha/api.js?render=6LfF2kUtAAAAABh-YoQdmybtgGBv0MWM1p1tfDmC"></script>
</head>
<body>
<div class="login-card text-center">
    <div class="brand"><i class="bi bi-cloud-arrow-up me-2"></i>SFTP Manager</div>
    <div class="subtitle">Sign in or create an account</div>

    <div id="alert-msg" class="alert-msg"></div>

    <!-- Google -->
    <a href="/oauth2/authorization/google-portal" class="google-btn mb-2">
        <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
    </a>

    <div class="divider">or</div>

    <!-- Email / Password -->
    <div class="text-start">
        <div class="mb-3">
            <label class="form-label small fw-semibold">Email address</label>
            <input class="form-control form-control-sm" type="email" id="email" placeholder="you@example.com" autocomplete="email" oninput="checkNewUser()">
            <div class="field-error" id="email-err"></div>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-semibold">Password</label>
            <div class="pw-toggle">
                <input class="form-control form-control-sm" type="password" id="password" placeholder="Min. 8 characters" autocomplete="current-password">
                <button class="eye" onclick="togglePw()" tabindex="-1" type="button">
                    <i class="bi bi-eye" id="eye-icon"></i>
                </button>
            </div>
            <div class="field-error" id="password-err"></div>
            <div class="text-end mt-1">
                <a href="#" class="text-muted" style="font-size:.78rem" onclick="forgotPassword(event)">Forgot password?</a>
            </div>
        </div>
        <!-- Name fields - shown when creating a new account -->
        <div id="name-fields" style="display:none">
            <div class="mb-3">
                <label class="form-label small fw-semibold">First Name</label>
                <input class="form-control form-control-sm" type="text" id="firstName" placeholder="Jane" autocomplete="given-name">
                <div class="field-error" id="firstName-err"></div>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-semibold">Surname</label>
                <input class="form-control form-control-sm" type="text" id="surname" placeholder="Smith" autocomplete="family-name">
                <div class="field-error" id="surname-err"></div>
            </div>
        </div>
        <div class="form-text mb-3" id="form-hint">New to SFTP Manager? Enter your email and we'll check if you have an account.</div>
        <button class="btn btn-primary w-100 btn-sm" id="signin-btn" onclick="emailSignIn()">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign in / Create account
        </button>
    </div>

    <div class="footer-note mt-3">
        By signing in you agree to our terms of service.
    </div>
</div>

<script>
function togglePw() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}

function showAlert(msg, type) {
    const el = document.getElementById('alert-msg');
    el.className = 'alert-msg alert-' + type;
    el.innerHTML = msg;
    el.style.display = 'block';
}

function showErr(id, msg) {
    const el = document.getElementById(id);
    if (el) el.textContent = msg || '';
    const input = document.getElementById(id.replace('-err',''));
    if (input) input.classList.toggle('is-invalid', !!msg);
}

let isNewUser = false;
let checkTimer = null;

async function checkNewUser() {
    const email = document.getElementById('email').value.trim();
    clearTimeout(checkTimer);
    if (!email.includes('@')) return;
    checkTimer = setTimeout(async () => {
        try {
            const res = await fetch('/portal/api/auth/check-email', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            isNewUser = data.newUser;
            const nameFields = document.getElementById('name-fields');
            const hint = document.getElementById('form-hint');
            if (isNewUser) {
                nameFields.style.display = 'block';

                hint.textContent = "Looks like you're new! Fill in your details to create an account.";
                document.getElementById('signin-btn').innerHTML = '<i class="bi bi-person-plus me-2"></i>Create account';
            } else {
                nameFields.style.display = 'none';

                hint.textContent = 'Welcome back! Enter your password to sign in.';
                document.getElementById('signin-btn').innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Sign in';
            }
        } catch(e) {}
    }, 500);
}

async function forgotPassword(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email || !email.includes('@')) {
        showErr('email-err', 'Enter your email address above first, then click Forgot password');
        return;
    }
    showErr('email-err', null);
    try {
        const res = await fetch('/portal/api/auth/forgot-password', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        showAlert('<i class="bi bi-envelope-check me-2"></i>' + (data.message || 'If that email is registered, a reset link has been sent.'), 'success');
    } catch(err) {
        showAlert('Network error. Please try again.', 'error');
    }
}

async function emailSignIn() {
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;
    const firstName = document.getElementById('firstName').value.trim();
    const surname   = document.getElementById('surname').value.trim();
    let valid = true;

    if (!email || !email.includes('@')) {
        showErr('email-err', 'Please enter a valid email address'); valid = false;
    } else showErr('email-err', null);

    if (!password || password.length < 8) {
        showErr('password-err', 'Password must be at least 8 characters'); valid = false;
    } else showErr('password-err', null);

    if (isNewUser) {
        if (!firstName) { showErr('firstName-err', 'First name is required'); valid = false; }
        else showErr('firstName-err', null);
        if (!surname) { showErr('surname-err', 'Surname is required'); valid = false; }
        else showErr('surname-err', null);
    }

    if (!valid) return;

    const btn = document.getElementById('signin-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Please wait...';

    try {
        // Get reCAPTCHA v3 token (invisible, always runs)
        let captchaToken = '';
        if (isNewUser && typeof grecaptcha !== 'undefined') {
            captchaToken = await new Promise((resolve) => {
                grecaptcha.ready(() => {
		    grecaptcha.execute('6LfF2kUtAAAAABh-YoQdmybtgGBv0MWM1p1tfDmC', {action: 'signup'})
                        .then(resolve);
                });
            });
        }

        const res = await fetch('/portal/api/auth/email-signin', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ email, password, firstName, surname, captchaToken })
        });
        const data = await res.json();

        if (res.ok && data.success) {
            window.location.href = '/portal';
        } else {
            showAlert('<i class="bi bi-exclamation-circle me-2"></i>' + (data.error || 'Sign in failed. Please try again.'), 'error');
        }
    } catch(e) {
        showAlert('Network error. Please try again.', 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = isNewUser
            ? '<i class="bi bi-person-plus me-2"></i>Create account'
            : '<i class="bi bi-box-arrow-in-right me-2"></i>Sign in';
    }
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') emailSignIn();
});

if (window.location.search.includes('error=true')) {
    showAlert('<i class="bi bi-exclamation-circle me-2"></i>Google sign in failed. Please try again.', 'error');
}
</script>
</body>
</html>
