<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SFTP Manager — Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background:linear-gradient(135deg,#1a1f36 0%,#2d3748 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card-box { background:#fff; border-radius:16px; padding:40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
        .brand { font-size:1.3rem; font-weight:700; color:#1a1f36; margin-bottom:4px; text-align:center; }
        .subtitle { color:#6b7280; font-size:.9rem; margin-bottom:24px; text-align:center; }
        .alert-msg { border-radius:8px; padding:11px 14px; font-size:.86rem; margin-bottom:14px; display:none; }
        .alert-error { background:#fef2f2; border:1px solid #fecaca; color:#dc2626; }
        .alert-success { background:#d1fae5; border:1px solid #6ee7b7; color:#065f46; }
        .field-error { color:#dc2626; font-size:.78rem; margin-top:3px; }
        .pw-hint { font-size:.75rem; color:#9ca3af; margin-top:3px; }
    </style>
</head>
<body>
<div class="card-box">
    <div class="brand"><i class="bi bi-cloud-arrow-up me-2"></i>SFTP Manager</div>
    <div class="subtitle">Choose a new password</div>

    <div id="alert-msg" class="alert-msg"></div>

    <div id="reset-form">
        <div class="mb-3">
            <label class="form-label small fw-semibold">New password</label>
            <input class="form-control" type="password" id="password" placeholder="Min. 8 characters">
            <div class="field-error" id="password-err"></div>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-semibold">Confirm new password</label>
            <input class="form-control" type="password" id="password2" placeholder="Re-enter password">
            <div class="field-error" id="password2-err"></div>
        </div>
        <button class="btn btn-primary w-100" id="reset-btn" onclick="doReset()">
            <i class="bi bi-key me-2"></i>Set new password
        </button>
        <div class="pw-hint text-center mt-3">This link expires 10 minutes after it was requested.</div>
    </div>

    <div id="success-view" style="display:none;text-align:center">
        <i class="bi bi-check-circle text-success" style="font-size:3rem"></i>
        <h5 class="fw-bold mt-3">Password updated!</h5>
        <p class="text-muted small">You can now sign in with your new password.</p>
        <a href="/portal/login" class="btn btn-primary mt-2">Go to sign in</a>
    </div>
</div>

<script>
const token = new URLSearchParams(window.location.search).get('token');

function showErr(id, msg) {
    const el = document.getElementById(id);
    if (el) el.textContent = msg || '';
}
function showAlert(msg, type) {
    const el = document.getElementById('alert-msg');
    el.className = 'alert-msg alert-' + type;
    el.textContent = msg;
    el.style.display = 'block';
}

async function doReset() {
    const pw  = document.getElementById('password').value;
    const pw2 = document.getElementById('password2').value;
    let valid = true;

    if (!pw || pw.length < 8) { showErr('password-err', 'Password must be at least 8 characters'); valid = false; }
    else showErr('password-err', null);

    if (pw !== pw2) { showErr('password2-err', 'Passwords do not match'); valid = false; }
    else showErr('password2-err', null);

    if (!valid) return;

    if (!token) { showAlert('Invalid reset link — no token found.', 'error'); return; }

    const btn = document.getElementById('reset-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Updating...';

    try {
        const res = await fetch('/portal/api/auth/reset-password', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ token, password: pw })
        });
        const data = await res.json();
        if (res.ok && data.success) {
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('success-view').style.display = 'block';
            document.getElementById('alert-msg').style.display = 'none';
        } else {
            showAlert(data.error || 'Reset failed. Please request a new link.', 'error');
        }
    } catch(e) {
        showAlert('Network error. Please try again.', 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-key me-2"></i>Set new password';
    }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });

if (!token) showAlert('Invalid reset link — no token found.', 'error');
</script>
</body>
</html>
