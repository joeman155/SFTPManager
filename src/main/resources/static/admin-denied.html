<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SFTP Manager — Access Denied</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background:linear-gradient(135deg,#1a1f36 0%,#2d3748 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:#fff; border-radius:16px; padding:48px 40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.3); text-align:center; }
        .icon { font-size:3rem; color:#ef4444; margin-bottom:16px; }
        h4 { font-weight:700; color:#1a1f36; margin-bottom:8px; }
        p { color:#6b7280; font-size:.92rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon"><i class="bi bi-shield-x"></i></div>
    <h4>Access denied</h4>
    <p>Your Google account does not have administrator access to this panel.</p>
    <p>Contact your system administrator to request access.</p>
    <a href="/admin-login.html" class="btn btn-outline-secondary btn-sm mt-2">
        <i class="bi bi-arrow-left me-1"></i>Back to sign in
    </a>
    <a href="/portal" class="btn btn-primary btn-sm mt-2 ms-2">
        <i class="bi bi-cloud-arrow-up me-1"></i>Go to portal
    </a>
</div>
</body>
</html>
