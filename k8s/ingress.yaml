# GKE Ingress using Google-managed SSL certificate
# No cert-manager needed - Google handles SSL automatically
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sftp-manager-ingress
  namespace: sftp-manager
  annotations:
    # Use GKE's native HTTP(S) load balancer
    kubernetes.io/ingress.class: "gce"
    # Link to the ManagedCertificate
    networking.gke.io/managed-certificates: "sftp-leederville-cert"
    # Force HTTPS
    kubernetes.io/ingress.allow-http: "true"
    # Static IP (we'll create this below)
    kubernetes.io/ingress.global-static-ip-name: "sftp-manager-ip"
spec:
  rules:
    - host: sftp.leederville.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sftp-manager-service
                port:
                  number: 80

