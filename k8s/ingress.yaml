apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sftp-manager-ingress
  namespace: sftp-manager
  annotations:
    # Automatically provision a Let's Encrypt SSL certificate
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sftp.leederville.net
      secretName: sftp-leederville-tls
  rules:
    - host: sftp.leederville.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sftp-manager-service
                port:
                  number: 80
