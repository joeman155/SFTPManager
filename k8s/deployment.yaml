apiVersion: apps/v1
kind: Deployment
metadata:
  name: sftp-manager
  labels:
    app: sftp-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sftp-manager
  template:
    metadata:
      labels:
        app: sftp-manager
    spec:
      containers:
        - name: sftp-manager
          image: sftp-manager:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: sftp-manager-secrets
                  key: db-host
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: sftp-manager-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: sftp-manager-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sftp-manager-secrets
                  key: db-password
          readinessProbe:
            httpGet:
              path: /api/users
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: sftp-manager-service
spec:
  selector:
    app: sftp-manager
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
---
apiVersion: v1
kind: Secret
metadata:
  name: sftp-manager-secrets
type: Opaque
stringData:
  db-host: "your-postgres-host"
  db-name: "sftpmanager"
  db-user: "sftpmanager"
  db-password: "changeme"
