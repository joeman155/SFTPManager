# BackendConfig tells GKE to enable IAP on the backend service
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: sftp-manager-iap-config
  namespace: sftp-manager
spec:
  iap:
    enabled: true
    oauthclientCredentials:
      secretName: iap-secret
  # Health check config
  healthCheck:
    checkIntervalSec: 30
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    type: HTTP
    requestPath: /healthz
    port: 8080
